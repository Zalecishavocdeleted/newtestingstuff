<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GD Proxy Test</title>
</head>
<body>
  <h2>GD ApiWrapper Proxy Test</h2>
  <button onclick="runTest()">Run Test</button>

  <script>
    window._gdProxyUrl = "https://gd-proxy.gmdc.workers.dev";

    window.ApiWrapper = class ApiWrapper {
      static proxyurl = "";

      static setProxy(string) {
        this.proxyurl = string;
      }

      static getProxy() {
        return this.proxyurl;
      }

      static async downloadSong(id) {
        let data = `songID=${id}&secret=Wmfd2893gb7`;

        let response = await fetch(window._gdProxyUrl + "/getGJSongInfo.php", {
          method: "POST",
          body: data
        });

        let text = await response.text();

        let url = decodeURIComponent(
          text?.split("~|~10~|~")[1]?.split("~|~")[0]
        );

        let audioresponse = await fetch(this.proxyurl + url);
        let blob = await audioresponse.blob();

        return URL.createObjectURL(blob);
      }

      static async downloadSfx(id) {
        let audioresponse = await fetch(
          this.proxyurl + "https://geometrydashfiles.b-cdn.net/sfx/s" + id + ".ogg"
        );

        let blob = await audioresponse.blob();
        return URL.createObjectURL(blob);
      }

      // 🔥 NEW: JSDELIVR FIRST + FALLBACK
      static async downloadLevel(id) {
        // ---------- 1. TRY JSDELIVR ----------
        try {
          let jsdelivrUrl = `https://cdn.jsdelivr.net/gh/YOUR_USER/YOUR_REPO/levels/${id}.json?t=${Date.now()}`;

          let res = await fetch(jsdelivrUrl);

          if (res.ok) {
            let parsed = await res.json();

            console.log("Loaded level from JSDelivr:", id);

            return parsed;
          }

          throw new Error("JSDelivr empty or failed");
        } catch (e) {
          console.warn("JSDelivr failed, falling back to API:", e);
        }

        // ---------- 2. FALLBACK TO GD API ----------
        let data = `levelID=${id}&secret=Wmfd2893gb7`;

        let response = await fetch(window._gdProxyUrl + "/downloadGJLevel22.php", {
          method: "POST",
          body: data
        });

        let text = await response.text();

        console.log("LEVEL RAW:", text);

        function parseresponse(text) {
          let parts = text.split(":");
          let data = {};

          for (let i = 0; i < parts.length - 1; i += 2) {
            data[parts[i]] = parts[i + 1];
          }

          return data;
        }

        let parsed = parseresponse(text);

        console.log("LEVEL PARSED:", parsed);

        return parsed;
      }
    };

    async function runTest() {
      console.clear();
      console.log("=== PROXY TEST START ===");

      try {
        let level = await ApiWrapper.downloadLevel(118509879);

        const blob = new Blob(
          [JSON.stringify(level, null, 2)],
          { type: "application/json" }
        );

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = "level_118509879.json";
        a.click();

        URL.revokeObjectURL(url);

        console.log("Downloaded level file");

      } catch (e) {
        console.error("Test failed:", e);
      }

      console.log("=== PROXY TEST END ===");
    }
  </script>
</body>
</html>
